<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Cursos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn-crear {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            display: block;
            margin: 0 auto 30px;
            transition: background 0.3s;
        }

        .btn-crear:hover {
            background: #5568d3;
        }

        .cursos-lista {
            margin-top: 30px;
        }

        .cursos-lista h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .curso-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .curso-info {
            flex: 1;
        }

        .curso-nombre {
            color: #333;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .curso-id {
            color: #999;
            font-size: 12px;
        }

        .curso-acciones {
            display: flex;
            gap: 10px;
        }

        .btn-editar, .btn-eliminar {
            padding: 8px 15px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        .btn-editar {
            background: #ffc107;
            color: #333;
        }

        .btn-eliminar {
            background: #dc3545;
            color: white;
        }

        .btn-editar:hover, .btn-eliminar:hover {
            opacity: 0.8;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.activo {
            display: flex;
        }

        .modal-contenido {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .modal-contenido h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-grupo {
            margin-bottom: 20px;
        }

        .form-grupo label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-grupo input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-grupo input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .botones-modal {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-guardar, .btn-cancelar {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .btn-guardar {
            background: #667eea;
            color: white;
        }

        .btn-cancelar {
            background: #e9ecef;
            color: #333;
        }

        .btn-guardar:hover, .btn-cancelar:hover {
            opacity: 0.8;
        }

        .mensaje {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .mensaje.exitoso {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .mensaje.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .mensaje.activo {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .cargando {
            text-align: center;
            color: #667eea;
            padding: 20px;
            font-style: italic;
        }

        .sin-cursos {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Gestor de Cursos</h1>

        <div id="mensaje" class="mensaje"></div>

        <button class="btn-crear" onclick="abrirModalCrear()">+ Crear Nuevo Curso</button>

        <div class="cursos-lista">
            <h2>Cursos Registrados</h2>
            <div id="listaCursos" class="cargando">Cargando cursos...</div>
        </div>
    </div>

    <!-- Modal para crear/editar curso -->
    <div id="modal" class="modal">
        <div class="modal-contenido">
            <h2 id="modalTitulo">Crear Nuevo Curso</h2>

            <div class="form-grupo">
                <label for="nombreCurso">Nombre del Curso:</label>
                <input type="text" id="nombreCurso" placeholder="Ingresa el nombre del curso" autofocus>
            </div>

            <div class="botones-modal">
                <button class="btn-guardar" onclick="guardarCurso()">Guardar</button>
                <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/cursos';
        let cursoEnEdicion = null;

        // Cargar cursos al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            cargarCursos();
        });

        // Cargar lista de cursos
        async function cargarCursos() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.success) {
                    let html = '';

                    if (data.cursos.length === 0) {
                        html = '<div class="sin-cursos">No hay cursos aún. ¡Crea uno para comenzar!</div>';
                    } else {
                        data.cursos.forEach(curso => {
                            const fecha = new Date(curso.fechaCreacion).toLocaleDateString('es-ES');
                            html += `
                                <div class="curso-item">
                                    <div class="curso-info">
                                        <div class="curso-nombre">${curso.nombreCurso}</div>
                                        <div class="curso-id">ID: ${curso.idCurso} | Creado: ${fecha}</div>
                                    </div>
                                    <div class="curso-acciones">
                                        <button class="btn-editar" onclick="abrirModalEditar(${curso.idCurso}, '${curso.nombreCurso}')">Editar</button>
                                        <button class="btn-eliminar" onclick="eliminarCurso(${curso.idCurso})">Eliminar</button>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    document.getElementById('listaCursos').innerHTML = html;
                } else {
                    mostrarMensaje('Error al cargar cursos', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error de conexión con el servidor', 'error');
            }
        }

        // Abrir modal para crear nuevo curso
        function abrirModalCrear() {
            cursoEnEdicion = null;
            document.getElementById('modalTitulo').textContent = 'Crear Nuevo Curso';
            document.getElementById('nombreCurso').value = '';
            document.getElementById('modal').classList.add('activo');
            document.getElementById('nombreCurso').focus();
        }

        // Abrir modal para editar curso
        function abrirModalEditar(idCurso, nombreCurso) {
            cursoEnEdicion = idCurso;
            document.getElementById('modalTitulo').textContent = 'Editar Curso';
            document.getElementById('nombreCurso').value = nombreCurso;
            document.getElementById('modal').classList.add('activo');
            document.getElementById('nombreCurso').focus();
            document.getElementById('nombreCurso').select();
        }

        // Cerrar modal
        function cerrarModal() {
            document.getElementById('modal').classList.remove('activo');
            cursoEnEdicion = null;
        }

        // Cerrar modal al presionar Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                cerrarModal();
            }
        });

        // Guardar curso (crear o editar)
        async function guardarCurso() {
            const nombreCurso = document.getElementById('nombreCurso').value.trim();

            if (!nombreCurso) {
                mostrarMensaje('Por favor, ingresa un nombre para el curso', 'error');
                return;
            }

            try {
                let response;
                let metodo;

                if (cursoEnEdicion) {
                    // Editar curso
                    metodo = 'PUT';
                    response = await fetch(`${API_URL}/${cursoEnEdicion}`, {
                        method: metodo,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nombreCurso })
                    });
                } else {
                    // Crear curso
                    metodo = 'POST';
                    response = await fetch(API_URL, {
                        method: metodo,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nombreCurso })
                    });
                }

                const data = await response.json();

                if (data.success) {
                    const mensaje = cursoEnEdicion ? 'Curso actualizado exitosamente' : 'Curso creado exitosamente';
                    mostrarMensaje(mensaje, 'exitoso');
                    cerrarModal();
                    cargarCursos();
                } else {
                    mostrarMensaje(data.message || 'Error al guardar el curso', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error de conexión', 'error');
            }
        }

        // Eliminar curso
        async function eliminarCurso(idCurso) {
            if (!confirm('¿Estás seguro de que deseas eliminar este curso?')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${idCurso}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    mostrarMensaje('Curso eliminado exitosamente', 'exitoso');
                    cargarCursos();
                } else {
                    mostrarMensaje(data.message || 'Error al eliminar el curso', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error de conexión', 'error');
            }
        }

        // Mostrar mensaje
        function mostrarMensaje(texto, tipo) {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.textContent = texto;
            mensajeDiv.className = `mensaje ${tipo} activo`;

            setTimeout(() => {
                mensajeDiv.classList.remove('activo');
            }, 4000);
        }

        // Guardar al presionar Enter
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.getElementById('modal').classList.contains('activo')) {
                guardarCurso();
            }
        });
    </script>
</body>
</html>
