<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripciones - Academia Odontológica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #0288d1 0%, #01579b 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: opacity 0.3s;
        }

        .nav-link:hover {
            opacity: 0.8;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h2 {
            color: #0288d1;
            margin-bottom: 30px;
            font-size: 28px;
        }

        /* Formulario */
        .form-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-grupo {
            margin-bottom: 25px;
        }

        .form-grupo label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 16px;
        }

        .form-grupo input,
        .form-grupo select,
        .form-grupo textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-grupo input:focus,
        .form-grupo select:focus,
        .form-grupo textarea:focus {
            outline: none;
            border-color: #0288d1;
            box-shadow: 0 0 8px rgba(2, 136, 209, 0.3);
        }

        .form-grupo textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-grupo.obligatorio label::after {
            content: " *";
            color: #dc3545;
        }

        /* Botones */
        .botones-form {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-enviar {
            background: linear-gradient(135deg, #00838f 0%, #004d56 100%);
            color: white;
        }

        .btn-enviar:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(0, 131, 143, 0.4);
        }

        .btn-limpiar {
            background: #e0e0e0;
            color: #333;
        }

        .btn-limpiar:hover {
            background: #d0d0d0;
        }

        /* Mensaje de éxito */
        .mensaje {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .mensaje.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .mensaje.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        /* Info section */
        .info-section {
            background: #e3f2fd;
            border-left: 5px solid #0288d1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .info-section h3 {
            color: #0288d1;
            margin-bottom: 10px;
        }

        .info-section p {
            color: #555;
            line-height: 1.6;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            header h1 {
                font-size: 20px;
            }

            .nav-link {
                margin-left: 10px;
                font-size: 14px;
            }

            h2 {
                font-size: 22px;
            }

            .form-container {
                padding: 25px;
            }

            .botones-form {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <h1>🦷 Academia Odontológica</h1>
            <nav>
                <a href="/" class="nav-link">Inicio</a>
                <a href="/cursos.html" class="nav-link">Cursos</a>
                <a href="/inscripciones.html" class="nav-link">Inscripciones</a>
                <a href="/admin.html" class="nav-link">Admin</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <h2>Formulario de Inscripción</h2>

        <div class="info-section">
            <h3>ℹ️ Información importante</h3>
            <p>
                Completa este formulario para inscribirte en nuestros cursos de odontología. 
                Tras enviar tu solicitud, nuestro equipo la revisará y te contactará en breve 
                para confirmar tu inscripción.
            </p>
        </div>

        <div class="form-container">
            <div id="mensaje" class="mensaje"></div>

            <form id="formInscripcion">
                <!-- Datos Personales -->
                <div class="form-grupo obligatorio">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-grupo obligatorio">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-grupo obligatorio">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" required>
                </div>

                <div class="form-grupo obligatorio">
                    <label for="cedula">Cédula/Documento de Identidad</label>
                    <input type="text" id="cedula" name="cedula" required>
                </div>

                <!-- Formación Académica -->
                <div class="form-grupo obligatorio">
                    <label for="profesion">Profesión/Especialidad</label>
                    <input type="text" id="profesion" name="profesion" placeholder="Ej: Odontólogo, Higienista" required>
                </div>

                <div class="form-grupo obligatorio">
                    <label for="curso">Selecciona el Curso</label>
                    <select id="curso" name="curso" required>
                        <option value="">-- Selecciona un curso --</option>
                        <option value="endodoncia">Especialización en Endodoncia</option>
                        <option value="ortodoncia">Especialización en Ortodoncia</option>
                        <option value="implantologia">Implantología Dental</option>
                        <option value="periodoncia">Periodoncia Clínica</option>
                        <option value="protesis">Prótesis Dental Avanzada</option>
                        <option value="estetica">Odontología Estética</option>
                    </select>
                </div>

                <!-- Observaciones -->
                <div class="form-grupo">
                    <label for="observaciones">Observaciones o Comentarios</label>
                    <textarea id="observaciones" name="observaciones" placeholder="Cuéntanos por qué deseas tomar este curso..."></textarea>
                </div>

                <!-- Términos y Condiciones -->
                <div class="form-grupo">
                    <label style="display: flex; align-items: center; font-weight: normal;">
                        <input type="checkbox" id="terminos" name="terminos" required style="width: auto; margin-right: 10px;">
                        Acepto los términos y condiciones de la Academia Odontológica
                    </label>
                </div>

                <!-- Botones -->
                <div class="botones-form">
                    <button type="submit" class="btn btn-enviar">Enviar Inscripción</button>
                    <button type="reset" class="btn btn-limpiar">Limpiar Formulario</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('formInscripcion').addEventListener('submit', function(e) {
            e.preventDefault();

            const mensaje = document.getElementById('mensaje');

            // Validar acepto de términos
            if (!document.getElementById('terminos').checked) {
                mensaje.className = 'mensaje error';
                mensaje.textContent = 'Debes aceptar los términos y condiciones para continuar.';
                return;
            }

            // Mostrar mensaje de éxito simulado
            // En un caso real, aquí se enviaría la información a un servidor
            mensaje.className = 'mensaje success';
            mensaje.textContent = '✓ ¡Inscripción enviada exitosamente! Te contactaremos pronto.';

            // Limpiar formulario después de 2 segundos
            setTimeout(() => {
                document.getElementById('formInscripcion').reset();
                mensaje.className = 'mensaje';
            }, 3000);

            console.log('Datos de inscripción:', {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                cedula: document.getElementById('cedula').value,
                profesion: document.getElementById('profesion').value,
                curso: document.getElementById('curso').value,
                observaciones: document.getElementById('observaciones').value
            });
        });
    </script>
</body>
</html>
